flow_id: flow-balance-entries-and-general-balance
name: Balance entries and general balance
status: v1
owner_area: transactions
evidence_level: confirmed
abstract: |
  Explica cómo funciona el sistema de balance de Saldoar: qué es un Entry, cuándo
  se crea, cómo evoluciona su status según el estado de la transacción asociada, y
  por qué el balance general no refleja un ingreso hasta que la transacción es
  confirmada. Cubre depósito, retiro, swap y transferencia como operaciones de
  balance. Relevante para soporte (por qué no se ve el saldo), producto (diseño
  de la lógica pendiente/aprobado) y UX (por qué un movimiento aparece en la lista
  individual pero no suma al total).
query_patterns:
  - "¿por qué el balance general no se actualizó después de un depósito?"
  - "hice un ingreso y no aparece en mi saldo disponible"
  - "¿por qué el movimiento aparece en la lista pero no suma al balance?"
  - "¿qué es un entry de balance?"
  - "¿cuándo se acredita el saldo en balance?"
  - "el balance individual muestra el movimiento pero el general no"
  - "¿por qué el pedido de depósito a balance figura como enviando?"
  - "¿por qué una operación de balance aparece en la lista de pedidos?"
  - "¿cómo se calcula el balance disponible del usuario?"
  - "¿qué diferencia hay entre balance individual y balance general?"
