business_rules:
  - toda operación de balance (deposit, withdrawal, swap, transfer) crea una transacción normal y un Entry asociado
  - el Entry de depósito nace con status PENDING_DEPOSIT; el de retiro con PENDING_WITHDRAWAL
  - el status del Entry se sincroniza con el estado de la transacción vía TransactionStateChangedEvent
  - estados de transacción CREDITED_PAYMENT / PRE_APPROVED_SENT / SENT / MEDIATION mueven el Entry a APPROVED
  - estados CANCELED / SCAMMED / NONE mueven el Entry a REJECTED
  - estados WAITING_PAYMENT / HELD / TO_FUTURE / TO_FUTURE_READY / VALIDATION_REQUIRED mantienen el Entry en PENDING
  - el balance general suma únicamente entries con status APPROVED o PENDING_WITHDRAWAL
  - PENDING_WITHDRAWAL suma al balance general desde la creación del retiro, antes de confirmar — reserva el saldo
  - PENDING_DEPOSIT no suma al balance general hasta ser APPROVED — evita saldo inflado no confirmado
  - el balance general se recalcula en cada save de Entry vía BalanceUpdaterEntryObserver
  - el retiro falla en creación si el balance disponible es insuficiente (cheque en DB transaction)
  - el pedido creado por una operación de balance aparece en la lista de pedidos como cualquier otra transacción
  - el label "Enviando" en la lista de pedidos corresponde al estado 12 (CREDITED_PAYMENT) de la transacción
edge_cases:
  - el movimiento aparece en la lista individual de entries antes de impactar el balance general
  - el label "Enviando" en lista de pedidos puede confundir al usuario que espera ver su saldo acreditado de inmediato
  - PENDING_WITHDRAWAL descuenta del balance inmediatamente al crear el retiro, sin esperar confirmación
  - si la transacción de retiro queda en HELD o WAITING_PAYMENT, el Entry sigue como PENDING_WITHDRAWAL y el saldo sigue reservado
unknowns:
  - comportamiento exacto de swap y transfer a nivel de Entry (no trazado en esta iteración)
  - si existen entries no atados a transaction (entryable distinto de transaction)
  - cómo se muestra el estado del Entry en la UI de balance individual (pending vs approved)
