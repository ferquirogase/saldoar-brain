business_rules:
  - instructions page is assembled from helpers plus send and receive sectors
  - send sector variant depends on balance, agreement1_id, direct transfers or crypto
  - instructions read can be marked by pixel request or by direct_transfers1 access policy
  - mark instructions read sets instructions_read_at and schedules a visited-but-did-not-pay job
  - direct_transfer_actions are only allowed if the transfer is not already sent and belongs to the current user/transaction context
  - direct_transfers1 are filtered by behaviour before display
  - agreement QR is fetched through mercadopagoqr endpoint
  - receive side helper is determined by ReceivedPaymentConfirmationHelperRepository.getReceivedPaymentsStatus()
  - received=NO on a directTransfer2 falls to still_receiving or all_sent, never to received_unknown
  - received_unknown requires sent=true AND received=UNKNOWN
  - when received=NO Saldoar can only consult the counterpart; it does not manage the funds directly
integrations:
  - mercadopago qr
  - local mark-as-sent state service
  - websocket-driven transaction refresh
  - hidden pixel tracking
edge_cases:
  - edge_case_id: vcc-copy-looks-like-balance-reception
  - edge_case_id: simultaneous-orders-omitted
  - edge_case_id: instructions-read-side-effects
  - edge_case_id: payment-disappears-on-to-future-ready
  - edge_case_id: davivienda-interbank-delay
  - description: same flow has multiple UI variants with different components and behaviors
  - description: read-tracking is triggered in more than one way
  - description: helper banners can substantially alter the experience for the same nominal state
  - description: local mark-as-sent state may diverge from backend expectations if not validated end-to-end
  - description: received=NO in receive sector shows still_receiving or all_sent helper with no-recibido copy
unknowns:
  - exact persistence model of MarketAtSendService
  - full catalog of direct_transfer_action values
  - when transaction_instructions_redirect_urls overrides main instructions UI
  - full behavior of balance-instructions branch
