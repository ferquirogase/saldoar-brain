flow_id: flow-payment-instructions
name: Payment instructions
status: v1
owner_area: transactions
evidence_level: confirmed
abstract: |
  Explica cómo Saldoar presenta las instrucciones de pago. Cubre las cuatro variantes
  según tipo de operación: transferencia directa, QR de MercadoPago, crypto y balance.
  Incluye el mecanismo dual de marcado de lectura (píxel + política de acceso), los
  efectos internos al marcar instrucciones como leídas, el filtrado de directTransfers1
  por comportamiento, los helpers contextuales que modifican la experiencia, y la
  lógica del sector de recepción incluyendo la casuística de pagos marcados como
  no recibidos. Relevante para UX, soporte de pagos y operaciones.
query_patterns:
  - "¿dónde veo los datos para hacer la transferencia?"
  - "no aparecen las cuentas bancarias para pagar"
  - "¿cómo pago con QR?"
  - "¿cómo pago con crypto?"
  - "¿qué pasa cuando marco que ya pagué?"
  - "el usuario no puede ver las instrucciones de pago"
  - "¿cuándo se considera que el usuario leyó las instrucciones?"
  - "¿por qué las instrucciones son diferentes según el tipo de operación?"
  - "¿qué es directTransfers1?"
  - "¿qué es el píxel de seguimiento?"
  - "¿qué pasa cuando el receptor marca un pago como no recibido?"
  - "¿qué mensaje ve el receptor si marcó que no recibió el pago?"
  - "el usuario dice que no le llegó el dinero, qué ve en la app?"
  - "¿qué hace el sistema cuando se reporta un pago no recibido?"
