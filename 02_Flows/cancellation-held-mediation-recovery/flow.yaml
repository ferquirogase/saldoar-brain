  - direct_transfer2
  - screenshot
  - task
business_rules:
  - user cancellation is allowed only for a narrow set of not-yet-advanced transactions
  - backend treats pending transactions differently depending on whether direct transfers already exist
  - recent instructions reading or recent direct transfer activity delays automatic cancellation or hold
  - pending transactions without direct transfers use time and rate-variation windows to decide cancellation versus hold
  - pending transactions with direct transfers can release unsent destinations, cancel, hold, credit or move to mediation
  - disputes with non-received transfers can move transactions to HELD_DISPUTED
  - some canceled or held transactions can recover deleted destinations and return to a held review state
  - disputes can be released back to WAITING_PAYMENT or CREDITED_PAYMENT if reception issues disappear
edge_cases:
  - edge_case_id: held-disputed-without-screenshots
  - edge_case_id: pix-key-late-held
  - edge_case_id: to-future-ready-looks-stalled
  - review states do not appear to have the same notification coverage as basic lifecycle states
  - deals-bag transactions are explicitly excluded from some destination-recovery logic
  - a user-visible dead end may still be internally recoverable
  - recovery depends heavily on background jobs and operator actions
unknowns:
  - full catalog of manual actions that force HELD or MEDIATION
  - exact timing constants beyond the pipes inspected here
  - all user-facing presentations of HELD_DISPUTED
  - whether alternative notifications exist outside the main state notification repository
