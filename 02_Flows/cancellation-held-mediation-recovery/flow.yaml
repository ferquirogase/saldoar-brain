flow_id: flow-cancellation-held-mediation-recovery
name: Cancellation, held, mediation and recovery
status: v1
owner_area: transactions
evidence_level: confirmed
abstract: |
  Explica los estados de bloqueo y recuperación de transacciones. Cubre cuándo un
  usuario puede cancelar manualmente, los criterios automáticos para pasar a HELD o
  MEDIATION según si existen transferencias directas, el estado HELD_DISPUTED para
  disputas de no recepción, y los mecanismos de recuperación mediante jobs en background
  y acciones de operadores. También explica por qué una transacción puede parecer
  muerta pero ser internamente recuperable. Relevante para soporte y operaciones.
query_patterns:
  - "¿por qué mi pedido está retenido o bloqueado?"
  - "¿qué es HELD?"
  - "¿qué es mediación?"
  - "¿puedo cancelar mi pedido?"
  - "¿cuándo cancela Saldoar automáticamente?"
  - "el usuario pagó pero el pedido sigue bloqueado"
  - "¿cómo se sale del estado HELD?"
  - "¿qué pasa cuando hay una disputa?"
  - "mi pedido fue cancelado sin que yo lo cancelara"
  - "¿qué es HELD_DISPUTED?"
entry_points:
  - POST /v3/users/{user_id}/transactions/{transaction_id}/cancel
  - POST /v3/t/{transaction_id}/cancel
  - /pedido-cancelado
  - automatic pending-processing commands
  - recovery actions and dispute-release jobs
