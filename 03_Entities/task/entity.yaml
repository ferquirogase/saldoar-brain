entity_id: task
name: Task
status: mapped
priority: critical

summary: >
  Entidad de trabajo operativo. Representa la tarea pendiente o realizada que
  nace de un estado y habilita asignación, prioridad y pipelines manuales.

backend_model:
  - saldo/app/Transactions/Tasks/Task.php
  - saldo/app/Transactions/Tasks/TaskTypesEnum.php
  - saldo/app/Users/Operators/OperatorTaskHelper.php
  - saldo/app/Transactions/Helpers/StatesAndTasks/TransactionStateHelper.php

key_attributes:
  - state_id
  - author_user_id
  - assigned_user_id
  - priority
  - since
  - completed
  - created_at

key_relationships:
  - state
  - authorUser
  - assignedUser

main_task_types:
  - cancel
  - freeze
  - add_destinations
  - change_destination
  - destination_not_valid
  - credit_reset
  - credit
  - recover
  - resize
  - reverse_transaction
  - finish_as_sent
  - to_mediation

connected_domains:
  - support-and-operations
  - transactions
  - validations

connected_flows:
  - chat-state-chips-and-support-actions
  - operator-interventions-and-panel-actions
  - cancellation-held-mediation-recovery
  - notifications-mails-and-background-jobs
