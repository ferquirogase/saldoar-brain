edge_case_id: vcc-copy-looks-like-balance-reception
name: VCC Copy Looks Like Balance Reception
status: v1
severity: medium
evidence_level: confirmed

summary: >
  En la rama VCC, usar copy de "recibir saldo" o "enviar saldo" genera un modelo
  mental incorrecto. La documentacion confirmada describe una experiencia de
  generacion de tarjeta, carga en PayPal y verificacion, no una acreditacion de
  saldo en la VCC como destino final comun.

query_patterns:
  - "por que en VCC dice recibir saldo si solo sirve para verificar PayPal"
  - "VCC recibe saldo o solo verifica la cuenta"
  - "por que el stepper dice enviando tu saldo en una operacion VCC"

