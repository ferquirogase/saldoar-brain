summary: >
  TO_FUTURE_READY es un estado valido con salida potencial, pero para el
  usuario puede sentirse como pedido trabado o abandonado. Suele aparecer
  cuando no hay destinos disponibles o el next step no logra cerrar una ruta
  operativa limpia.

