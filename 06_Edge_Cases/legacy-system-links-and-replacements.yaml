edge_case_id: legacy-system-links-and-replacements
name: Legacy System Links And Replacements
status: v1
severity: medium
evidence_level: confirmed

summary: >
  Un link historico o slug publico puede terminar mostrando otro sistema
  visible si el original fue reemplazado con replacement_system_id. Es
  continuidad intencional, no necesariamente link roto.

