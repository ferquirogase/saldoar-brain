edge_case_id: chat-visible-but-locked
name: Chat Visible But Locked
status: v1
severity: medium
evidence_level: confirmed

summary: >
  El area de chat puede estar visible aunque el usuario no pueda escribir
  porque backend todavia no abrio el input libre. Mientras tanto, el flujo
  prioriza state chips y ayuda guiada.

query_patterns:
  - "por que veo el chat pero no puedo escribir"
  - "cuando se habilita de verdad el chat"
  - "por que a un usuario le aparecen chips y a otro input libre"

